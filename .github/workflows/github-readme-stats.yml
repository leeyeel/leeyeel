name: Update GitHub Stats

on:
  schedule:
    - cron: '0 6 * * *'  # 每天早六点更新一次
  workflow_dispatch:  # 可手动触发

jobs:
  generate_cards:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate GitHub Stats Card
        uses: stats-organization/github-readme-stats-action@v0.9.1
        with:
          token: ${{ secrets.GH_TOKEN }}  # 从 GitHub Secrets 获取 Token
          stats_card: true
          top_langs_card: true
          options: locale=en&count_private=true
          path: stats.svg

      - name: Commit and push generated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg top-langs.svg
          git commit -m "Update GitHub stats" || exit 0
          git push
